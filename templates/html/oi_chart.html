<div class="oc-chart" style="--put-bar:$PUT_BAR;--call-bar:$CALL_BAR">
  <h2 class="oc-chart__title">$title</h2>
  <div class="oc-chart__subtitle">$subtitle</div>
  <div class="oc-chart__body">
    <div class="oc-chart__yticks" style="height:${CH}px">$yticks</div>
    <div class="oc-chart__canvas">
      <div class="oc-chart__gridline-overlay">$gridlines</div>
      <div class="oc-chart__bars" style="height:${CH}px">$bars</div>
    </div>
  </div>
  $spot_display
  $legend
</div>
