<div class="oc-opening-cards">
  <div class="oc-card oc-card--day-open">
    <div class="oc-card__label">DAY OPEN PRICE</div>
    <div class="oc-card__value oc-card__value--gold">$display_open</div>
    $open_hilo_label
  </div>
  <div class="oc-card oc-card--straddle-open">
    <div class="oc-card__label">OPENING STRADDLE</div>
    <div class="oc-card__value oc-card__value--green">Strike $saved_strike</div>
  </div>
  <div class="oc-card oc-card--straddle-live">
    <div class="oc-card__label">STRADDLE LIVE PRICE</div>
    <div class="oc-card__value oc-card__value--blue">$total_straddle</div>
    <div class="oc-card__sub">C: <span class="oc-card__sub-val">$c_ltp</span> | P: <span class="oc-card__sub-val">$p_ltp</span></div>
  </div>
</div>
